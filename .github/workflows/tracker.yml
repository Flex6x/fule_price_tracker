name: Fuel Price Tracker

# Trigger: Manuell oder per API
on:
  # Erlaubt manuelles Ausführen des Workflows
  workflow_dispatch:

  # Auch bei Push zum main Branch
  push:
    branches:
      - main
    paths:
      - 'track.py'

# Berechtigungen für Git Push und Workflow Dispatch
permissions:
  contents: write
  actions: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      # Checkout des Repositories
      - name: Checkout code
        uses: actions/checkout@v4

      # Python 3.11 Setup
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Chrome Browser für Selenium installieren
      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest

      # Dependencies installieren (selenium + webdriver-manager)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 selenium webdriver-manager

      # Spritpreis-Tracker ausführen
      - name: Run fuel price tracker
        run: python track.py

      # Git-Konfiguration für automatische Commits
      - name: Configure Git
        run: |
          git config --local user.name "tracker"
          git config --local user.email "tracker@example.com"

      # Committen und pushen falls Änderungen vorhanden sind
      - name: Commit and push if prices changed
        run: |
          if git diff --quiet e10_prices.csv diesel_prices.csv; then
            echo "No changes in price files - skipping commit"
          else
            echo "Changes detected in price files - committing"
            git add e10_prices.csv diesel_prices.csv
            git config --local user.name "tracker"
            git config --local user.email "tracker@example.com"
            git commit -m "chore: update fuel prices - $(date +'%Y-%m-%d %H:%M:%S') CET"
            git push
          fi

      # Warte 2 Minuten dann triggere nächsten Run
      - name: Wait 2 minutes and trigger next run
        continue-on-error: true
        run: |
          echo "[*] Warte 2 Minuten bis zum nächsten Run..."
          sleep 120
          echo "[*] Triggere nächsten Workflow-Run via REST API..."
          curl -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/tracker.yml/dispatches \
            -d '{"ref":"main"}'
          echo "Workflow getriggert!"




